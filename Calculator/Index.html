<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Calculator</h1>

<div class="theme-switcher">
  <button onclick="setTheme('dark')">Dark</button>
  <button onclick="setTheme('neon')">Neon</button>
</div>

<div class="calculator" id="calculator">

    <input type="text" id="expression" placeholder="0" readonly>
    <input type="text" id="result" placeholder="0" readonly>

    <div class="buttons">
        <button onclick="clearResult()">C</button>
        <button onclick="deleteLast()">⌫</button>
        <button onclick="appendValue('%')">%</button>
        <button onclick="appendValue('/')">÷</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('*')">×</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('-')">-</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('+')">+</button>

        <button onclick="appendValue('0')" class="zero">0</button>
        <button onclick="appendValue('.')">.</button>
        <button onclick="calculate()">=</button>

        <!-- Extra functions -->
        <button onclick="appendValue('Math.sqrt(')">√</button>
        <button onclick="appendValue('**2')">x²</button>
        <button onclick="appendValue('Math.PI')">π</button>
    </div>
</div>

<script src="script.js"></script>
</body>
          </html>
